name: Sync clients from Google Sheet

# Pulls the public "Client Data and IDs" sheet into Supabase every 5 minutes.
# Phase 1: pull-only (sheet → DB). Phase 2 will add the push direction
# (DB → sheet) using a Google service account.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL                — e.g. https://ngxdukdmudtebykmihgw.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY   — service role key from Supabase dashboard
#                                 (NOT the anon key — service_role bypasses RLS)
#
# Optional overrides (only set if you want to point at a different sheet):
#   CLIENT_SHEET_ID
#   CLIENT_SHEET_NAME

on:
  schedule:
    # GitHub's free cron resolution is 5 minutes; this is the highest frequency.
    # Note: scheduled runs can be delayed during peak times — that's a known
    # GitHub limitation, not a bug in our setup.
    - cron: "*/5 * * * *"
  workflow_dispatch:        # allows manual "Run workflow" from the UI
  push:
    paths:                  # also re-run when the script itself changes
      - "scripts/sync-clients-from-sheet.mjs"
      - ".github/workflows/sync-clients.yml"

# Don't pile up runs if a previous one is still going
concurrency:
  group: sync-clients
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # We only need @supabase/supabase-js — already in package.json
        run: npm ci

      - name: Run sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync-clients-from-sheet.mjs
