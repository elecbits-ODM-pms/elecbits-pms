# Fly.io config for Azoox server
# Deploy with: fly launch --no-deploy (first time) then fly deploy

app = "azoox-server"
primary_region = "bom"  # Mumbai — change if you prefer

[build]

[env]
  PORT = "3000"
  WORKSPACE = "/data/azoox-workspace"
  REPO_URL = "https://github.com/elecbits-ODM-pms/elecbits-pms.git"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[mounts]
  source = "azoox_data"
  destination = "/data"
